<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text-to-Speech</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <div class="card">
            <div class="title-area">
                <div class="mic-icon">🎤</div>
                <div>
                    <h1>Text-to-Speech</h1>
                    <p>Powered by Azure Cognitive Services</p>
                </div>
            </div>

            <form action="/text-to-speech" method="POST">
                <label for="text" class="input-label">Enter text to convert to speech:</label>

                <textarea
                    name="text"
                    id="text"
                    rows="6"
                    placeholder="Hello, EE471 class"
                >{{ request.form.get('text', '') }}</textarea>

                <div class="button-row">
                    <button type="submit" class="btn btn-primary">🔊 Synthesize Speech</button>
                    <button type="button" class="btn btn-secondary" onclick="clearText()">Clear</button>
                </div>
            </form>

            {% if success %}
                <div class="message success">✓ {{ success }}</div>
            {% endif %}

            {% if error %}
                <div class="message error">{{ error }}</div>
            {% endif %}

            {% if audio_file %}
                <div class="audio-box">
                    <h3>Generated Audio:</h3>

                    <audio controls>
                        <source src="{{ audio_file }}" type="audio/wav">
                        Tarayıcınız audio etiketini desteklemiyor.
                    </audio>

                    <a class="download-btn" href="{{ audio_file }}" download>⬇ Download Audio</a>
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        function clearText() {
            document.getElementById("text").value = "";
        }
    </script>
</body>
</html>
