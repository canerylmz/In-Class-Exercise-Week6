<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Speech Services</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="outer-frame">
        <div class="app-card">
            <div class="header">
                <div class="header-icon">🎤</div>
                <div class="header-text">
                    <h1>Azure Speech Services</h1>
                    <p>Text-to-Speech &amp; Speech-to-Text powered by Azure Cognitive Services</p>
                </div>
            </div>

            <div class="tab-row">
                <a href="/tts" class="tab-link active">Text to Speech</a>
                <a href="/" class="tab-link">Speech to Text</a>
            </div>

            <form action="/text-to-speech" method="POST">
                <label for="text" class="section-label">Enter text to convert to speech:</label>

                <textarea
                    name="text"
                    id="text"
                    class="text-input"
                    rows="6"
                    placeholder="Hello, EE471 class"
                >{{ request.form.get('text', '') }}</textarea>

                <div class="action-row">
                    <button type="submit" class="main-btn transcribe-btn">🔊 Synthesize Speech</button>
                    <button type="button" class="main-btn clear-btn" onclick="clearText()">Clear</button>
                </div>
            </form>

            {% if success %}
                <div class="success-box">{{ success }}</div>
            {% endif %}

            {% if error %}
                <div class="error-box">{{ error }}</div>
            {% endif %}

            {% if audio_file %}
                <div class="transcription-panel audio-panel">
                    <h3>Generated Audio:</h3>
                    <audio controls class="audio-player">
                        <source src="{{ audio_file }}" type="audio/wav">
                        Your browser does not support the audio element.
                    </audio>
                    <a class="copy-btn download-btn" href="{{ audio_file }}" download>⬇ Download Audio</a>
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        function clearText() {
            document.getElementById("text").value = "";
        }
    </script>
</body>
</html>
