<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azure Speech Services</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="outer-frame">
        <div class="app-card">
            <div class="header">
                <div class="header-icon">🎤</div>
                <div class="header-text">
                    <h1>Azure Speech Services</h1>
                    <p>Text-to-Speech &amp; Speech-to-Text powered by Azure Cognitive Services</p>
                </div>
            </div>

            <div class="tab-row">
                <a href="/tts" class="tab-link">Text to Speech</a>
                <a href="/" class="tab-link active">Speech to Text</a>
            </div>

            <form id="sttForm" action="/speech-to-text" method="POST" enctype="multipart/form-data">
                <label for="audio" class="section-label">
                    Record or upload audio to convert to text:
                </label>

                <div class="top-controls">
                    <button type="button" class="control-btn purple-btn" id="startBtn">
                        <span class="btn-icon">🎙️</span>
                        <span>Start<br>Recording</span>
                    </button>

                    <button type="button" class="control-btn red-btn" id="stopBtn">
                        <span class="btn-icon">⏹️</span>
                        <span>Stop<br>Recording</span>
                    </button>

                    <div class="file-picker-wrap">
                        <input type="file" name="audio" id="audio" accept="audio/*">
                    </div>
                </div>

                <div class="recording-box" id="recordingStatus">● Not recording</div>

                <input type="hidden" name="recorded_audio_name" id="recordedAudioName">

                <div class="action-row">
                    <button type="submit" class="main-btn transcribe-btn">📋 Transcribe Audio</button>
                    <button type="button" class="main-btn clear-btn" onclick="clearAllFields()">Clear</button>
                </div>
            </form>

            <div class="transcription-panel">
                <h3>Transcription:</h3>
                <div class="transcription-output" id="transcriptionOutput">
                    {% if transcript %}{{ transcript }}{% endif %}
                </div>
                <button type="button" class="copy-btn" onclick="copyTranscript()">📋 Copy Text</button>
            </div>

            {% if success %}
                <div class="success-box">✓ {{ success }}</div>
            {% endif %}

            {% if error %}
                <div class="error-box">{{ error }}</div>
            {% endif %}
        </div>
    </div>

    <script>
        let audioContext;
        let mediaStream;
        let mediaSource;
        let processorNode;
        let audioChunks = [];

        const startBtn = document.getElementById("startBtn");
        const stopBtn = document.getElementById("stopBtn");
        const recordingStatus = document.getElementById("recordingStatus");
        const audioInput = document.getElementById("audio");
        const recordedAudioNameInput = document.getElementById("recordedAudioName");
        const transcriptionOutput = document.getElementById("transcriptionOutput");

        function mergeBuffers(chunks) {
            const totalLength = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
            const result = new Float32Array(totalLength);
            let offset = 0;

            for (const chunk of chunks) {
                result.set(chunk, offset);
                offset += chunk.length;
            }

            return result;
        }

        function floatTo16BitPCM(view, offset, input) {
            for (let i = 0; i < input.length; i += 1, offset += 2) {
                const sample = Math.max(-1, Math.min(1, input[i]));
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
            }
        }

        function writeString(view, offset, value) {
            for (let i = 0; i < value.length; i += 1) {
                view.setUint8(offset + i, value.charCodeAt(i));
            }
        }

        function createWavBlob(chunks, sampleRate) {
            const samples = mergeBuffers(chunks);
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);

            writeString(view, 0, "RIFF");
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(view, 8, "WAVE");
            writeString(view, 12, "fmt ");
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, "data");
            view.setUint32(40, samples.length * 2, true);
            floatTo16BitPCM(view, 44, samples);

            return new Blob([view], { type: "audio/wav" });
        }

        async function resetRecordingResources() {
            if (processorNode) {
                processorNode.disconnect();
                processorNode.onaudioprocess = null;
                processorNode = null;
            }

            if (mediaSource) {
                mediaSource.disconnect();
                mediaSource = null;
            }

            if (mediaStream) {
                mediaStream.getTracks().forEach((track) => track.stop());
                mediaStream = null;
            }

            if (audioContext) {
                await audioContext.close();
                audioContext = null;
            }
        }

        startBtn.addEventListener("click", async () => {
            try {
                await resetRecordingResources();
                audioChunks = [];
                recordedAudioNameInput.value = "";
                audioInput.value = "";

                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                mediaSource = audioContext.createMediaStreamSource(mediaStream);
                processorNode = audioContext.createScriptProcessor(4096, 1, 1);

                processorNode.onaudioprocess = (event) => {
                    const inputData = event.inputBuffer.getChannelData(0);
                    audioChunks.push(new Float32Array(inputData));
                };

                mediaSource.connect(processorNode);
                processorNode.connect(audioContext.destination);

                recordingStatus.textContent = "● Recording...";
                recordingStatus.classList.add("active-recording");
                recordingStatus.classList.remove("saved-box");
            } catch (error) {
                recordingStatus.textContent = "● Microphone access denied or unavailable";
                recordingStatus.classList.remove("saved-box");
                recordingStatus.classList.add("active-recording");
            }
        });

        stopBtn.addEventListener("click", async () => {
            if (!audioContext || audioChunks.length === 0) {
                return;
            }

            const wavBlob = createWavBlob(audioChunks, audioContext.sampleRate);
            await resetRecordingResources();

            const formData = new FormData();
            formData.append("recorded_audio", wavBlob, "recording.wav");

            const response = await fetch("/save-recording", {
                method: "POST",
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                recordedAudioNameInput.value = result.filename;
                recordingStatus.textContent = "● Recording saved successfully";
                recordingStatus.classList.add("saved-box");
                recordingStatus.classList.remove("active-recording");
            } else {
                recordingStatus.textContent = "● Failed to save recording";
                recordingStatus.classList.add("active-recording");
                recordingStatus.classList.remove("saved-box");
            }
        });

        async function clearAllFields() {
            await resetRecordingResources();
            audioChunks = [];
            audioInput.value = "";
            recordedAudioNameInput.value = "";
            transcriptionOutput.innerText = "";
            recordingStatus.textContent = "● Not recording";
            recordingStatus.classList.remove("active-recording");
            recordingStatus.classList.remove("saved-box");
        }

        function copyTranscript() {
            const text = transcriptionOutput.innerText.trim();

            if (text) {
                navigator.clipboard.writeText(text);
            }
        }
    </script>
</body>
</html>
